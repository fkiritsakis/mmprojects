<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Records</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="jukebox-container">
        <header>
            <h1>The Late Night Mix</h1>
            <p>Click a album to load the playlist</p>
        </header>

        <div class="main-layout">
            
            <!-- Vinyl Records Grid (Left Side) -->
            <div class="record-grid" id="jukebox-grid">
                <!-- Records (buttons) go here -->
            </div>

            <!-- Spotify Player Area (Right Side) -->
            <div class="player-area">
                <div id="spotify-player-container">
                    <!-- The Spotify Embed will load here -->
                    <div class="placeholder-player">
                        Select a record to begin...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
